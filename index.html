<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F4EFE4" />
<title>HeyBuddy — Version 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F4EFE4;--paper:#FBF8F0;--vanilla:#E7DCA8;--sand:#C9B875;--ink:#2D2A24;--brown:#665D4D;--muted:#91897C;--line:rgba(45,42,36,.11);--line2:rgba(45,42,36,.18);--white:#FFFDF8;--shadow:0 24px 70px rgba(75,64,43,.14);--safe-top:max(18px,env(safe-area-inset-top));--safe-bottom:max(18px,env(safe-area-inset-bottom));}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#EAE5DA}body{font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}button{font:inherit;color:inherit}.app{width:min(100%,470px);min-height:100dvh;margin:0 auto;background:radial-gradient(circle at 15% 5%,rgba(255,255,255,.55),transparent 25%),var(--cream);position:relative;overflow:hidden}.screen{display:none;min-height:100dvh;padding:var(--safe-top) 22px calc(84px + var(--safe-bottom))}.screen.active{display:block;animation:fadeIn .35s ease both}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}.fraunces,.wordmark{font-family:Fraunces,Georgia,serif}.wordmark{font-size:31px;line-height:1;letter-spacing:-.055em;font-weight:600}.primary{width:100%;min-height:58px;border:0;border-radius:18px;background:var(--ink);color:var(--white);font-weight:700;box-shadow:0 14px 30px rgba(45,42,36,.15)}.primary:active{transform:scale(.985)}.ghost{border:1px solid var(--line2);background:rgba(255,253,248,.62);border-radius:15px;min-height:46px;font-weight:700}.textbtn{border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:700;padding:8px}.eyebrow{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
/* Today */
.today-wrap{min-height:calc(100dvh - 110px - var(--safe-bottom));display:flex;flex-direction:column}.date{margin-top:17px;color:var(--brown);font-size:15px;font-weight:600}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:22px}.day{text-align:center;padding:8px 0 13px;border-radius:15px;color:rgba(45,42,36,.36);position:relative}.day.workout{background:rgba(231,220,168,.30);color:rgba(45,42,36,.72)}.day .l{display:block;font-size:9px;font-weight:700;letter-spacing:.08em;margin-bottom:6px}.day .n{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;margin:auto;font-size:12px;font-weight:700}.day.today .n{border:1px solid rgba(45,42,36,.70);background:rgba(255,253,248,.5)}.day.workout:after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:12px;height:2px;border-radius:99px;background:rgba(101,92,75,.48)}.day.completed:after{width:5px;height:5px;border-radius:50%;background:var(--brown)}.today-centre{margin:auto 0;text-align:center;padding:52px 0 56px}.opening{font-family:Fraunces,Georgia,serif;font-size:clamp(44px,12vw,59px);font-weight:500;line-height:.98;letter-spacing:-.047em;margin:0 0 40px}.begin{max-width:282px;margin:auto}
/* Workout */
#workout{padding:var(--safe-top) 18px calc(22px + var(--safe-bottom))}.topbar{display:grid;grid-template-columns:44px 1fr 68px;align-items:center}.icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(255,253,248,.65);display:grid;place-items:center}.topword{text-align:center;font-family:Fraunces,Georgia,serif;font-size:22px;font-weight:600;letter-spacing:-.045em}.sessiontime{text-align:right;font-size:12px;font-weight:700;color:var(--brown)}.workarea{min-height:calc(100dvh - 95px - var(--safe-bottom));display:flex;flex-direction:column;padding-top:24px}.exercise-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.exercise-head h1{font-family:Fraunces,Georgia,serif;font-size:38px;line-height:1.02;letter-spacing:-.045em;font-weight:500;margin:0;max-width:325px}.whybtn{flex:0 0 auto;border:1px solid var(--line2);background:rgba(255,253,248,.58);border-radius:999px;padding:9px 12px;font-size:11px;font-weight:700}.setmeta{margin-top:18px;color:var(--brown);font-size:14px;font-weight:600}.last{margin-top:18px;color:var(--muted);font-size:12px}.last strong{color:var(--ink);font-size:14px;margin-left:6px}.values{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:30px 0 24px}.value{border:0;background:transparent;text-align:left;padding:0;min-width:0}.value .num{display:block;font-size:64px;line-height:.9;letter-spacing:-.065em;font-weight:600}.value .unit{display:block;margin-top:10px;font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted)}.actionzone{margin-top:auto}.preview{margin-bottom:14px;border:1px solid var(--line);background:rgba(255,253,248,.50);border-radius:20px;padding:14px 15px;width:100%;text-align:left}.previewtop{display:flex;justify-content:space-between;align-items:center}.previewtitle{font-size:11px;font-weight:700;color:var(--brown)}.previewcount{font-size:10px;color:var(--muted)}.peek{display:grid;grid-template-columns:auto 1fr;gap:9px;margin-top:10px;align-items:center}.dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(45,42,36,.35)}.dot.current{background:var(--brown);border-color:var(--brown)}.peekname{font-size:12px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.more{margin:7px 0 0 17px;font-size:11px;color:var(--muted)}
/* acknowledgement/rest */
.overlay-state{position:absolute;inset:0;background:rgba(244,239,228,.96);z-index:20;display:none;padding:var(--safe-top) 24px calc(26px + var(--safe-bottom));align-items:center;justify-content:center;text-align:center}.overlay-state.show{display:flex;animation:fadeIn .2s ease}.observation{max-width:360px}.observation p{font-family:Fraunces,Georgia,serif;font-size:39px;line-height:1.05;letter-spacing:-.04em;margin:0 0 22px}.infochip{border:1px solid var(--line2);background:rgba(255,253,248,.72);border-radius:999px;padding:9px 13px;font-size:11px;font-weight:700}.restbox h2{font-family:Fraunces,Georgia,serif;font-size:30px;font-weight:500;margin:0 0 12px}.restnum{font-size:82px;line-height:.95;letter-spacing:-.07em;font-weight:600}.restnext{margin:24px 0 28px;color:var(--muted);font-size:13px}.restactions{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:320px;margin:auto}
/* sheets */
.scrim{position:absolute;inset:0;background:rgba(45,42,36,.28);backdrop-filter:blur(5px);z-index:40;opacity:0;pointer-events:none;transition:.25s}.scrim.show{opacity:1;pointer-events:auto}.sheet{position:absolute;left:0;right:0;bottom:0;z-index:50;background:var(--paper);border-radius:30px 30px 0 0;box-shadow:0 -24px 70px rgba(45,42,36,.17);padding:12px 20px calc(24px + var(--safe-bottom));max-height:82dvh;overflow:auto;transform:translateY(102%);transition:transform .32s cubic-bezier(.2,.8,.2,1)}.sheet.show{transform:translateY(0)}.handle{width:44px;height:5px;border-radius:99px;background:rgba(45,42,36,.18);margin:0 auto 18px}.sheet h2{font-family:Fraunces,Georgia,serif;font-size:33px;line-height:1.05;letter-spacing:-.04em;font-weight:500;margin:0 0 8px}.sheet p{color:var(--brown);font-size:13px;line-height:1.6}.worklist{margin-top:18px}.workrow{display:grid;grid-template-columns:20px 1fr auto;gap:10px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.workrow:last-child{border-bottom:0}.status{width:10px;height:10px;border-radius:50%;border:1px solid rgba(45,42,36,.3)}.status.done{background:var(--brown);border-color:var(--brown)}.status.current{box-shadow:0 0 0 4px rgba(201,184,117,.28);background:var(--sand);border-color:var(--sand)}.workname{font-size:13px;font-weight:700}.worksub{font-size:10px;color:var(--muted);margin-top:3px}.sheetsec{padding:17px 0;border-top:1px solid var(--line)}.sheetsec:first-of-type{border-top:0}.sheetsec h3{margin:0 0 7px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}.sheetsec p{margin:0;color:var(--ink)}.alts{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}.tag{font-size:11px;border:1px solid var(--line2);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.35)}
/* wheel */
.pickergrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.wheelwrap{text-align:center}.wheelwrap label{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:9px}.wheel{height:210px;overflow-y:auto;scroll-snap-type:y mandatory;border-radius:20px;background:rgba(255,255,255,.35);position:relative;scrollbar-width:none}.wheel::-webkit-scrollbar{display:none}.wheel:before,.wheel:after{content:"";display:block;height:78px}.wheelitem{height:54px;display:grid;place-items:center;scroll-snap-align:center;font-size:24px;font-weight:650;color:rgba(45,42,36,.35)}.wheelitem.selected{color:var(--ink);font-size:34px}.selectionline{position:absolute;left:0;right:0;top:50%;height:54px;transform:translateY(-50%);border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);pointer-events:none}.confirm{margin-top:18px}
/* complete */
.complete{text-align:center;padding-top:20vh}.complete h1{font-family:Fraunces,Georgia,serif;font-size:54px;line-height:1;letter-spacing:-.05em;font-weight:500;margin:0 0 18px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:34px 0}.sum{padding:15px 8px;border:1px solid var(--line);border-radius:18px;background:rgba(255,253,248,.55)}.sum strong{display:block;font-size:18px}.sum span{font-size:10px;color:var(--muted)}
@media(min-width:700px){body{padding:28px 0}.app{min-height:calc(100dvh - 56px);border-radius:38px;box-shadow:var(--shadow)}.screen{min-height:calc(100dvh - 56px)}.overlay-state{border-radius:38px}.sheet{left:0;right:0}}
</style>
</head>
<body>
<div class="app" id="app">
<section class="screen active" id="today">
  <div class="today-wrap">
    <div><div class="wordmark">HeyBuddy</div><div class="date" id="todayDate"></div><div class="calendar" id="calendar"></div></div>
    <div class="today-centre"><h1 class="opening">Let’s get to work.</h1><div class="begin"><button class="primary" id="beginBtn">Begin</button></div></div>
  </div>
</section>
<section class="screen" id="workout">
  <div class="topbar"><button class="icon" id="backBtn">←</button><div class="topword">HeyBuddy</div><div class="sessiontime" id="sessionTime">00:00</div></div>
  <div class="workarea">
    <div class="exercise-head"><h1 id="exerciseName"></h1><button class="whybtn" id="whyBtn">Why?</button></div>
    <div class="setmeta" id="setMeta"></div>
    <div class="last">Last time <strong id="lastPerformance"></strong></div>
    <div class="values"><button class="value" data-picker="weight"><span class="num" id="weightDisplay"></span><span class="unit">KG</span></button><button class="value" data-picker="reps"><span class="num" id="repsDisplay"></span><span class="unit">REPS</span></button></div>
    <div class="actionzone"><button class="preview" id="previewBtn"><div class="previewtop"><span class="previewtitle">Today’s workout</span><span class="previewcount" id="previewCount"></span></div><div class="peek"><span class="dot current"></span><span class="peekname" id="peekCurrent"></span><span class="dot"></span><span class="peekname" id="peekNext"></span></div><div class="more" id="peekMore"></div></button><button class="primary" id="completeSetBtn">Complete set</button></div>
  </div>
</section>
<section class="screen" id="done"><div class="complete"><div class="wordmark">HeyBuddy</div><h1>Good work.</h1><p id="doneLine">That session can stop following you around now.</p><div class="summary"><div class="sum"><strong id="doneTime">0:00</strong><span>TIME</span></div><div class="sum"><strong id="doneSets">0</strong><span>SETS</span></div><div class="sum"><strong id="doneVolume">0</strong><span>KG MOVED</span></div></div><button class="primary" onclick="location.reload()">Finish</button></div></section>

<div class="overlay-state" id="ackOverlay"><div class="observation"><p id="observationText"></p><button class="infochip" id="observationInfo">ⓘ Why Buddy said this</button></div></div>
<div class="overlay-state" id="restOverlay"><div class="restbox"><h2>Rest</h2><div class="restnum" id="restNumber">2:00</div><div class="restnext" id="restNext"></div><div class="restactions"><button class="ghost" id="readyBtn">Ready</button><button class="ghost" id="plusBtn">+30 sec</button></div></div></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="workoutSheet"><div class="handle"></div><h2>Today’s workout</h2><p>A quick look at the road ahead.</p><div class="worklist" id="workList"></div></div>
<div class="sheet" id="pickerSheet"><div class="handle"></div><h2>Log this set</h2><p>No keyboard. Your thumbs have suffered enough.</p><div class="pickergrid"><div class="wheelwrap"><label>WEIGHT</label><div class="wheel" id="weightWheel"><div class="selectionline"></div></div></div><div class="wheelwrap"><label>REPS</label><div class="wheel" id="repsWheel"><div class="selectionline"></div></div></div></div><button class="primary confirm" id="pickerConfirm">Use these numbers</button></div>
<div class="sheet" id="whySheet"><div class="handle"></div><h2 id="whyTitle"></h2><div id="whyContent"></div></div>
<div class="sheet" id="infoSheet"><div class="handle"></div><h2>Why Buddy mentioned it</h2><div id="infoContent"></div></div>
</div>
<script>
const exercises=[
{name:'Incline Dumbbell Press',sets:3,target:[8,10],weight:35,reps:9,last:'32.5 kg × 10',pattern:'Incline push',muscles:'Upper chest, front delts, triceps',purpose:'This gives the upper chest a strong stimulus while letting each shoulder move more freely than a fixed barbell path.',cues:['Set the bench around 20–30°','Keep shoulder blades settled','Lower with control and press slightly inward'],alternatives:['Smith incline press','Low-incline machine press','Flat dumbbell press'],evidence:'Pressing at a modest incline shifts emphasis toward the clavicular fibres without turning the lift into mostly shoulder work.'},
{name:'Chest-Supported Row',sets:3,target:[8,12],weight:45,reps:10,last:'45 kg × 10',pattern:'Horizontal pull',muscles:'Lats, upper back, rear delts, biceps',purpose:'The chest support removes lower-back fatigue, so the upper back can do the job without borrowing a spine from tomorrow.',cues:['Keep chest planted','Drive elbows back','Pause briefly at the top'],alternatives:['Seated cable row','Machine row','One-arm dumbbell row'],evidence:'Stable rowing variations can help maintain output and make the target musculature easier to load consistently.'},
{name:'Hack Squat',sets:3,target:[8,10],weight:100,reps:9,last:'95 kg × 10',pattern:'Squat',muscles:'Quads, glutes, adductors',purpose:'A stable squat pattern lets us load the legs hard without asking balance to run the meeting.',cues:['Keep full foot pressure','Let knees travel naturally','Control the bottom position'],alternatives:['Leg press','Smith squat','Pendulum squat'],evidence:'Stable machine squat patterns are useful hypertrophy tools because they support high local effort with less technical variability.'},
{name:'Seated Leg Curl',sets:3,target:[10,15],weight:55,reps:12,last:'52.5 kg × 13',pattern:'Knee flexion',muscles:'Hamstrings',purpose:'This trains the hamstrings through knee flexion while they begin in a lengthened hip position.',cues:['Keep hips down','Curl smoothly','Control the return'],alternatives:['Lying leg curl','Nordic curl','Standing single-leg curl'],evidence:'Training muscles at longer lengths may support hypertrophy, and seated curls place the biarticular hamstrings in a longer starting position.'},
{name:'Cable Lateral Raise',sets:3,target:[12,20],weight:10,reps:15,last:'10 kg × 14',pattern:'Shoulder abduction',muscles:'Side delts',purpose:'The cable keeps tension on the side delts through more of the range than gravity-only variations.',cues:['Lead with elbows','Stop before shrugging','Keep motion smooth'],alternatives:['Dumbbell lateral raise','Machine lateral raise','Lean-away cable raise'],evidence:'Consistent resistance through shoulder abduction can make the target muscle easier to train close to failure.'},
{name:'Cable Curl',sets:3,target:[10,15],weight:25,reps:12,last:'22.5 kg × 14',pattern:'Elbow flexion',muscles:'Biceps, brachialis',purpose:'A simple curl with stable resistance. No circus. Just elbows bending under load.',cues:['Keep upper arm quiet','Reach full extension','Avoid leaning back'],alternatives:['Preacher curl','Dumbbell curl','Machine curl'],evidence:'Multiple curl variations can be effective; the useful choice is one you can load comfortably through a repeatable range.'}
];
const state={exercise:0,set:1,weight:exercises[0].weight,reps:exercises[0].reps,startedAt:null,sessionInterval:null,rest:120,restInterval:null,setsLogged:0,volume:0,events:[],observationsShown:new Set(),currentObservation:null,firstWorkout:true};
const $=id=>document.getElementById(id); const screens=[...document.querySelectorAll('.screen')];
function showScreen(id){screens.forEach(s=>s.classList.toggle('active',s.id===id))}
function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function setupDate(){const d=new Date();$('todayDate').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});const monday=new Date(d);monday.setDate(d.getDate()-((d.getDay()+6)%7));const workoutIdx=[0,2,4];$('calendar').innerHTML='';for(let i=0;i<7;i++){const x=new Date(monday);x.setDate(monday.getDate()+i);const div=document.createElement('div');div.className='day'+(workoutIdx.includes(i)?' workout':'')+(x.toDateString()===d.toDateString()?' today':'')+(workoutIdx.includes(i)&&i<((d.getDay()+6)%7)?' completed':'');div.innerHTML=`<span class="l">${['M','T','W','T','F','S','S'][i]}</span><span class="n">${x.getDate()}</span>`;$('calendar').appendChild(div)}}
function begin(){state.startedAt=Date.now();state.sessionInterval=setInterval(()=>{$('sessionTime').textContent=formatTime(Math.floor((Date.now()-state.startedAt)/1000));maybeLongWorkout()},1000);showScreen('workout');renderWorkout();if(state.firstWorkout)setTimeout(()=>showObservation('first_workout',false),450)}
function renderWorkout(){const e=exercises[state.exercise];$('exerciseName').textContent=e.name;$('setMeta').textContent=`Set ${state.set} of ${e.sets} · ${e.target[0]}–${e.target[1]} reps`;$('lastPerformance').textContent=e.last;$('weightDisplay').textContent=clean(state.weight);$('repsDisplay').textContent=state.reps;$('previewCount').textContent=`${state.exercise+1} of ${exercises.length}`;$('peekCurrent').textContent=e.name;$('peekNext').textContent=exercises[state.exercise+1]?.name||'Last movement';$('peekMore').textContent=state.exercise<exercises.length-2?`+${exercises.length-state.exercise-2} more`:'Last one in view';renderWorkList()}
function renderWorkList(){$('workList').innerHTML=exercises.map((e,i)=>`<div class="workrow"><span class="status ${i<state.exercise?'done':i===state.exercise?'current':''}"></span><div><div class="workname">${e.name}</div><div class="worksub">${e.sets} sets · ${e.target[0]}–${e.target[1]} reps</div></div><span class="eyebrow">${i<state.exercise?'Done':i===state.exercise?'Now':'Later'}</span></div>`).join('')}
function clean(n){return Number.isInteger(n)?String(n):n.toFixed(1)}
function completeSet(){const e=exercises[state.exercise];state.events.push({type:'set_logged',exercise:e.name,set:state.set,weight:state.weight,reps:state.reps,target:e.target,time:Date.now()});state.setsLogged++;state.volume+=state.weight*state.reps;let obs=null;if(state.weight>parseFloat(e.last))obs='weight_increase';if(state.reps>e.target[1])obs='above_target';if(obs&&!state.observationsShown.has(obs)){showObservation(obs)}else{startRest()}}
function showObservation(type,continueToRest=true){const data=observationData(type);if(!data){if(continueToRest)startRest();return}state.currentObservation={type,...data,continueToRest};state.observationsShown.add(type);$('observationText').textContent=data.line;$('ackOverlay').classList.add('show');setTimeout(()=>{if($('ackOverlay').classList.contains('show')){$('ackOverlay').classList.remove('show');if(continueToRest)startRest()}},1450)}
function observationData(type){const map={first_workout:{line:'First one in the building. Let’s see what the furniture does.',noticed:'This is the first workout in this programme.',why:'The first session establishes a baseline. It gives Buddy useful numbers before making stronger recommendations.',mentioned:'New programme context is worth acknowledging once, then the work can speak for itself.',recommend:'Train normally and log honestly. Today is information, not an exam.'},weight_increase:{line:'That weight showed up with a little more paperwork today.',noticed:`You increased the load compared with the previous session.`,why:'A successful load increase is one form of progressive overload and can indicate that the previous weight had become manageable.',mentioned:'You changed a meaningful training variable, so Buddy marked the moment.',recommend:'Keep the increase if your reps stay in range and technique remains stable.'},above_target:{line:'Those reps kept arriving after the guest list closed.',noticed:'You completed more repetitions than the programmed upper target.',why:'Consistently exceeding the target can mean the current load is no longer challenging enough for the intended rep range.',mentioned:'This set crossed the top of the range, which may change what weight makes sense next time.',recommend:'Consider a small load increase on the next set or next session.'},short_rest:{line:'You’ve been treating the rest timer like decorative furniture.',noticed:'You ended three rest periods well before the planned time.',why:'Shortening rest can reduce force output and total quality repetitions, especially on demanding compound movements.',mentioned:'It became a repeated pattern rather than a one-off choice.',recommend:'Take the next full rest and see whether performance improves.'},long_workout:{line:'This workout has started forwarding its mail here.',noticed:'The session is running well beyond its planned duration.',why:'Long sessions can reflect extended rests, interruptions, or too much work for the available time.',mentioned:'The time difference became large enough to affect the plan.',recommend:'Finish the current priority work, then consider trimming optional accessories.'}};return map[type]}
function startRest(){if(!advanceSet())return;state.rest=120;$('restOverlay').classList.add('show');updateRest();clearInterval(state.restInterval);state.restInterval=setInterval(()=>{state.rest--;updateRest();if(state.rest<=0)endRest(false)},1000)}
function updateRest(){$('restNumber').textContent=formatTime(state.rest);const e=exercises[state.exercise];$('restNext').textContent=`Next · ${e.name} · Set ${state.set} of ${e.sets}`}
function advanceSet(){const e=exercises[state.exercise];if(state.set<e.sets){state.set++}else if(state.exercise<exercises.length-1){state.exercise++;state.set=1;state.weight=exercises[state.exercise].weight;state.reps=exercises[state.exercise].reps}else{finishWorkout();return false}renderWorkout();return true}
function endRest(skipped=true){clearInterval(state.restInterval);$('restOverlay').classList.remove('show');if(skipped){state.events.push({type:'rest_skipped',remaining:state.rest});const recent=state.events.filter(e=>e.type==='rest_skipped'&&e.remaining>50).slice(-3);if(recent.length>=3&&!state.observationsShown.has('short_rest')){setTimeout(()=>showObservation('short_rest'),250)}}}
function finishWorkout(){clearInterval(state.sessionInterval);clearInterval(state.restInterval);$('restOverlay').classList.remove('show');const sec=Math.floor((Date.now()-state.startedAt)/1000);$('doneTime').textContent=formatTime(sec);$('doneSets').textContent=state.setsLogged;$('doneVolume').textContent=Math.round(state.volume).toLocaleString('en-GB');showScreen('done')}
function maybeLongWorkout(){if(Date.now()-state.startedAt>75*60*1000&&!state.observationsShown.has('long_workout'))showObservation('long_workout')}
function openSheet(id){$('scrim').classList.add('show');$(id).classList.add('show')}function closeSheets(){$('scrim').classList.remove('show');document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'))}
function openWhy(){const e=exercises[state.exercise];$('whyTitle').textContent=e.name;$('whyContent').innerHTML=`<div class="sheetsec"><h3>Why this exercise?</h3><p>${e.purpose}</p></div><div class="sheetsec"><h3>Technique</h3><p>${e.cues.map(x=>'• '+x).join('<br>')}</p></div><div class="sheetsec"><h3>Muscles</h3><p>${e.muscles}</p></div><div class="sheetsec"><h3>Alternatives</h3><div class="alts">${e.alternatives.map(x=>`<span class="tag">${x}</span>`).join('')}</div></div><div class="sheetsec"><h3>Evidence</h3><p>${e.evidence}</p></div>`;openSheet('whySheet')}
function openInfo(){const o=state.currentObservation;if(!o)return;$('ackOverlay').classList.remove('show');clearInterval(state.restInterval);$('infoContent').innerHTML=`<div class="sheetsec"><h3>What I noticed</h3><p>${o.noticed}</p></div><div class="sheetsec"><h3>Why it matters</h3><p>${o.why}</p></div><div class="sheetsec"><h3>Why I mentioned it</h3><p>${o.mentioned}</p></div><div class="sheetsec"><h3>What I recommend</h3><p>${o.recommend}</p></div><div class="sheetsec"><h3>Learn more</h3><p>This explanation is a prototype of Buddy showing his reasoning. In the production app, this section will link to the underlying training principle and references.</p></div>`;openSheet('infoSheet')}
function buildWheel(el,vals,current){el.querySelectorAll('.wheelitem').forEach(x=>x.remove());vals.forEach(v=>{const d=document.createElement('div');d.className='wheelitem';d.dataset.value=v;d.textContent=clean(Number(v));el.appendChild(d)});requestAnimationFrame(()=>{const item=[...el.querySelectorAll('.wheelitem')].find(x=>Number(x.dataset.value)===Number(current));if(item)item.scrollIntoView({block:'center'})});updateWheel(el)}
function updateWheel(el){const items=[...el.querySelectorAll('.wheelitem')];const center=el.scrollTop+el.clientHeight/2;let best=null,dist=Infinity;items.forEach(i=>{const c=i.offsetTop+i.offsetHeight/2;const d=Math.abs(c-center);i.classList.toggle('selected',d<28);if(d<dist){dist=d;best=i}});el.dataset.selected=best?.dataset.value||''}
function openPicker(){const weights=Array.from({length:81},(_,i)=>i*2.5);const reps=Array.from({length:30},(_,i)=>i+1);buildWheel($('weightWheel'),weights,state.weight);buildWheel($('repsWheel'),reps,state.reps);openSheet('pickerSheet')}
$('beginBtn').onclick=begin;$('backBtn').onclick=()=>showScreen('today');$('previewBtn').onclick=()=>openSheet('workoutSheet');$('whyBtn').onclick=openWhy;$('completeSetBtn').onclick=completeSet;$('scrim').onclick=closeSheets;$('readyBtn').onclick=()=>endRest(true);$('plusBtn').onclick=()=>{state.rest+=30;updateRest()};$('observationInfo').onclick=openInfo;document.querySelectorAll('[data-picker]').forEach(b=>b.onclick=openPicker);$('pickerConfirm').onclick=()=>{state.weight=Number($('weightWheel').dataset.selected||state.weight);state.reps=Number($('repsWheel').dataset.selected||state.reps);renderWorkout();closeSheets()};['weightWheel','repsWheel'].forEach(id=>$(id).addEventListener('scroll',()=>updateWheel($(id)),{passive:true}));
setupDate();renderWorkout();
</script>
</body>
